<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConnect - Feed</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">DevConnect</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="feed.html">Feed</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="page-header">
        <h1>Community <span class="hero-accent">Board</span></h1>
        <p>Share updates, ask questions, and celebrate wins with the DevConnect community.</p>
    </section>

    <div class="feed-layout">

        <!-- Create Post Box -->
        <div class="create-post">
            <h3>💭 Create a Post</h3>
            <div class="post-input-area">
                <textarea id="postContent" rows="3" 
                placeholder="Share something with the community... use #tags like #javascript #help #project"></textarea>
                <div class="post-footer-bar">
                    <span class="char-counter" id="charCounter">0 / 280</span>
                    <button class="btn-primary" id="submitPost">Post</button>
                </div>
                <span class="error-msg" id="postError"></span>
            </div>
        </div>

        <!-- Posts Feed -->
        <div class="posts-container" id="postsContainer">
            <!-- Posts will be dynamically inserted here -->
        </div>

    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Feed JS -->
    <script src="js/feed.js"></script>
    <!-- Main JS -->
    <script src="js/main.js"></script>
    </main>

    <footer class="footer">
        <p>&copy; 2026 DevConnect. Built by Samuel C. William.</p>
    </footer>

</body>
</html>
