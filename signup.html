<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConnect - Sign Up</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">⟨ DevConnect /⟩</div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="feed.html">Feed</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1>Join <span class="hero-accent">DevConnect</span></h1>
            <p>Create your developer profile and connect with the community.</p>
        </section>

        <div class="signup-layout">

            <!-- Registration Form -->
             <div class="form-container">
                <h2>Developer Registration</h2>
                <form id="signupForm" novalidate>

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name">
                        <span class="error-msg" id="fullNameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="studentNumber">ID Number</label>
                        <input type="text" id="studentNumber" placeholder="'Enter your ID number">
                        <span class="error-msg" id="studentNumberError"></span>
                    </div>

                    <div class="form-group">
                        <label for="campus">Experience Level</label>
                        <select id="campus">
                            <option value="">-- Select Level --</option>
                            <option value="Beginner">Beginner (0-1 years)</option>
                            <option value="Junior">Junior (1-3 years)</option>
                            <option value="Mid-Level">Mid-Level (3-5 years)</option>
                            <option value="Senior">Senior (5+ years)</option>
                            <option value="Student">Student</option>
                        </select>
                        <span class="error-msg" id="campusError"></span>
                    </div>

                    <div class="form-group">
                        <label for="github">GitHub Username</label>
                        <input type="text" id="github" placeholder="e.g. john-doe">
                        <span class="error-msg" id="githubError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email address">
                        <span class="error-msg" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Minimum 8 characters">
                        <span class="error-msg" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Re-enter yur password">
                        <span class="error-msg" id="confirmPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="interests">Tech Stack / Interests</label>
                        <input type="text" id="interests" placeholder="e.g. JavaScript, Python, React">
                        <span class="error-msg" id="interestsError"></span>
                     </div>
                    
                      <div class="form-group">
                    <label for="bio">Short Bio</label>
                    <textarea id="bio" rows="3" placeholder="Tell the community about yourself..."></textarea>
                    <span class="error-msg" id="bioError"></span>
                </div>

                <button type="submit" class="btn-primary btn-full">Create Developer Account</button>

            </form>
        </div>

        <!-- Live Preview Panel -->
        <div class="preview-container">
            <h2>Live Live Preview</h2>
            <div class="preview-card">
                <div class="preview-avatar" id="previewAvatar">?</div>
                <h3 id="previewName">Your Name</h3>
                <p id="previewBio" class="preview-bio">Your bio will appear here...</p>
                <div class="preview-interests" id="previewInterests"></div>
            </div>
        </div>

    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Signup JS -->
    <script src="js/signup.js"></script>
    <!-- Main JS -->
    <script src="js/main.js"></script>

    </main>

    <footer class="footer">
        <p>&copy; 2026 DevConnect. Built by Samuel C. William.</p>
    </footer>

</body>
</html>
